<!DOCTYPE html>
<html>
<head>
<title>Poojitha ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: rgb(20, 4, 9);
    padding-bottom: 40px;

    background: linear-gradient(-45deg, #ec76c7, #ee9ca7, #ffb6c1, #ffc0cb);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

/* background animation */
@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 💎 glass header */
header {
    margin: 40px auto 20px;
    padding: 30px;
    width: 85%;
    max-width: 520px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(14px);

    border-radius: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* title glow */
h1 {
    font-size: 42px;
    text-shadow: 0 0 20px rgba(255,255,255,0.7);
    margin-bottom: 10px;
}

/* nav buttons */
nav {
    margin-top: 15px;
}

nav a {
    display: inline-block;
    margin: 8px;
    padding: 10px 16px;

    text-decoration: none;
    color: white;
    font-weight: bold;

    border-radius: 25px;
    background: rgba(255,255,255,0.2);

    transition: 0.3s;
}

nav a:hover {
    background: white;
    color: #ff4d6d;
    transform: scale(1.1);
}

/* text */
p {
    font-size: 16px;
    opacity: 0.95;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

/* 📸 PROFILE */
.profile {
    width: 95px;
    height: 95px;
    border-radius: 50%;

    margin: 25px auto;

    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.8);

    box-shadow:
        0 0 12px rgba(255,255,255,0.6),
        0 0 25px rgba(255,105,180,0.7),
        0 0 40px rgba(255,182,193,0.4);

    animation: glow 3s infinite alternate;
}

/* glow animation */
@keyframes glow {
    0% {
        transform: scale(1);
        box-shadow:
            0 0 10px rgba(255,255,255,0.5),
            0 0 20px rgba(255,105,180,0.5);
    }
    100% {
        transform: scale(1.05);
        box-shadow:
            0 0 18px rgba(255,255,255,0.8),
            0 0 35px rgba(255,105,180,0.8);
    }
}

.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* bottom section spacing */
h2 {
    margin-top: 15px;
}

</style>

</head>

<body>

<header>

<h1>Poojitha ❤️</h1>
<p>My favorite one, my story, my everything</p>

<nav>
<a href="story.html">Our Story</a>
<a href="memories.html">Memories</a>
<a href="chat.html">Chats</a>
<a href="secret.html">Secret</a>
<a href="myside.html"> My Side</a>
</nav>

</header>

    <img src="pooji3.jpeg" alt="Poojitha">
</div>

<h2>Pravalika → Poojitha 💖</h2>
<p>This is not just a website… it’s our journey.</p>

</body>
</html>
